[project]
name = "agiterra-wallet-extension-browser-use"
version = "0.4.0-dev.0"
description = "Thin launcher that loads the existing prod Agiterra Wallet extension into a browser-use Chromium (ENG-2947). No injected provider — the extension already injects window.ethereum and signs via Wire."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "browser-use>=0.12",
  "websockets>=12",
]

# The Wire-driving sign harness (wire_admin.py / wire_test_utils.py /
# e2e_*.py / pertab_test.py) needs an Ed25519 signer and eth signature
# recovery. launcher.py itself stays thin (deps above); install the extra to
# run the e2e/sign tests:  pip install -e '.[test]'
[project.optional-dependencies]
test = [
  "eth-account>=0.11",
  "cryptography>=42",
]

[project.urls]
repository = "https://github.com/agiterra/wallet-extension"

# Flat single-module package (launcher.py). Kept intentionally thin.
[tool.setuptools]
py-modules = ["launcher"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
