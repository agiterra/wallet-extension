<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>wallet-extension smoke test</title>
  <style>
    body { font-family: ui-monospace, monospace; padding: 2em; max-width: 800px; }
    button { padding: 0.5em 1em; margin: 0.25em; font-family: inherit; }
    pre { background: #f4f4f4; padding: 1em; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
    .ok { color: #0a0; }
    .err { color: #a00; }
  </style>
</head>
<body>
  <h1>wallet-extension smoke test</h1>
  <p>
    Loads the Agiterra Wallet via EIP-6963 (or falls back to window.ethereum),
    then exercises eth_requestAccounts + personal_sign. Expects the local-decider
    server (<code>bun scripts/local-decider-server.ts</code>) to be running.
  </p>

  <button id="provider">1. Discover provider</button>
  <button id="accounts">2. Request accounts</button>
  <button id="sign">3. personal_sign</button>
  <button id="refuse" title="Same as sign, but expects REFUSE=1 on the decider">3b. personal_sign (expect refusal)</button>

  <h3>Status</h3>
  <pre id="status">(idle)</pre>

  <h3>Last result</h3>
  <pre id="result">(none)</pre>

  <script>
    const status = (m, cls) => {
      const el = document.getElementById('status');
      el.textContent = m;
      el.className = cls ?? '';
    };
    const result = (m) => { document.getElementById('result').textContent = m; };

    let provider = null;

    // EIP-6963: listen for provider announcements
    window.addEventListener('eip6963:announceProvider', (e) => {
      const info = e.detail.info;
      console.log('[test] announced provider:', info.name, info.rdns);
      if (info.rdns === 'land.agiterra.wallet') {
        provider = e.detail.provider;
      }
    });

    document.getElementById('provider').onclick = () => {
      provider = null;
      window.dispatchEvent(new Event('eip6963:requestProvider'));
      setTimeout(() => {
        if (provider) {
          status(`Found provider: ${provider.isAgiterraWallet ? 'Agiterra Wallet' : 'unknown'}`, 'ok');
        } else if (window.ethereum) {
          provider = window.ethereum;
          status(`Fallback to window.ethereum (isAgiterraWallet=${!!window.ethereum.isAgiterraWallet})`, provider.isAgiterraWallet ? 'ok' : 'err');
        } else {
          status('No provider found. Is the extension loaded?', 'err');
        }
      }, 100);
    };

    document.getElementById('accounts').onclick = async () => {
      if (!provider) return status('Click "Discover provider" first', 'err');
      try {
        status('Requesting accounts...');
        const accounts = await provider.request({ method: 'eth_requestAccounts' });
        status(`Got ${accounts.length} account(s)`, 'ok');
        result(JSON.stringify(accounts, null, 2));
      } catch (e) {
        status(`Error ${e.code ?? '?'}: ${e.message}`, 'err');
        result(JSON.stringify({ code: e.code, message: e.message }, null, 2));
      }
    };

    document.getElementById('sign').onclick = async () => {
      if (!provider) return status('Click "Discover provider" first', 'err');
      try {
        const accounts = await provider.request({ method: 'eth_accounts' });
        const addr = accounts[0];
        if (!addr) return status('No account; click "Request accounts" first', 'err');
        const message = 'hello from the smoke test ' + new Date().toISOString();
        status(`Signing "${message}" as ${addr}...`);
        const sig = await provider.request({
          method: 'personal_sign',
          params: [message, addr],
        });
        status(`Signed.`, 'ok');
        result(JSON.stringify({ address: addr, message, signature: sig }, null, 2));
      } catch (e) {
        status(`Error ${e.code ?? '?'}: ${e.message}`, 'err');
        result(JSON.stringify({ code: e.code, message: e.message }, null, 2));
      }
    };

    document.getElementById('refuse').onclick = async () => {
      if (!provider) return status('Click "Discover provider" first', 'err');
      const accounts = await provider.request({ method: 'eth_accounts' });
      const addr = accounts[0];
      if (!addr) return status('No account; click "Request accounts" first', 'err');
      try {
        const sig = await provider.request({
          method: 'personal_sign',
          params: ['refuse me', addr],
        });
        status('Got signature (decider DIDN\'T refuse — is REFUSE=1 set on the server?)', 'err');
        result(sig);
      } catch (e) {
        if (e.code === 4001) {
          status(`Got expected 4001 refusal.`, 'ok');
        } else {
          status(`Unexpected error ${e.code ?? '?'}: ${e.message}`, 'err');
        }
        result(JSON.stringify({ code: e.code, message: e.message }, null, 2));
      }
    };
  </script>
</body>
</html>
